<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
       /* padding: 0;
        margin: 0;
        box-sizing:border-box;*/
        height:100vh;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        gap:20px;
        align-items: center;
        flex-wrap: wrap;
    }
    .product{
        border:2px solid black;
        width : 250px;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 10px;
        text-align: center;
        /*box-shadow:Xaxis Yaxis spread-area color*/
        box-shadow: 4px 4px 8px black;
    }
    .product:hover{
        background-color: coral;
        transition: 2s;
        transform: scale(1.03);
        color: white;
        transform: rotateY(200deg);
    }
    .product h2{
        border-bottom:1px solid black;
    }
    .product img{
        width:100%;
        height:260px;
        object-fit: cover;
        border-radius: 12px;
    }
    .product button{
        background-color: darkgray;
        border: none;
        padding: 10px;
        border-radius: 12px;
        width:90%;
    }
</style>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/3263239/pexels-photo-3263239.jpeg" >
        <h2>Tab</h2>
        <p>12000</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img src="https://images.pexels.com/photos/33548346/pexels-photo-33548346.jpeg">

        <h2>Head phones</h2>
        <p>999</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img src="https://images.pexels.com/photos/6893890/pexels-photo-6893890.jpeg" >
        <h2>Laptop</h2>
        <p>70000</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img src="https://images.pexels.com/photos/18533790/pexels-photo-18533790.jpeg" >
        <h2>Mobile</h2>
        <p>100000</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
