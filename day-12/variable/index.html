<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    //variable - It is a box in which we store values
    //syntax - variabletype/keyword variableName = value
    //1. var keyword-js creates a variable
       

    var username = "Saniya"
    console.log(username)
    var height = 5
    console.log("The height is ",height)
    var country = "India"
    var country = "Bharath"
    console.log(country)
    //Disadvantage of (var) is it allows you to use same variableName

    //VARIABLE WILL STORE ONLY ONE VALUE AT A TIME

    //2. let keyword - you can not use same variable

    let email = "saniya@gmail.com"
    console.log(email)
    let fruit = "Mango"
    fruit = "Apple"
    console.log(fruit)
    
    //you can still manipulate let keyword
    
    //3.const keyword - fixed,cannot be changed

    const appName = "Whatsapp"
    console.log(appName)
    </script>
</body>
</html>
