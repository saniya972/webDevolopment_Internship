<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // loops
        // 1.for loop --> if we know start point and end point go with for loop
        // for(start , end , operation)

        //print numbers from 1 to 10
        for(let i=0;i<=10;i++){
            console.log(`the value is ${i}`)
        } 

        //2.while loop --> Entry controlled loop
        //Rule -->  Condition is true loop starts and condition is false loop stops
         
        let count=1;
        while(count <=5){
            console.log("Hello while loop")
            count++
        }

        //3. Do while loop  --> it will run atleasst one time

        let number = 7
        do{
            alert("Hello i am notification - Pop up Message")
        }while(number <= 5)
    </script>
</body>
</html>
